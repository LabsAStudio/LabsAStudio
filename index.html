<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LabsAStudio</title>
  <meta name="description" content="LabsAStudio — Studio créatif digital en préparation." />
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#0b1113;
      --bg-2:#122027;
      --card:rgba(255,255,255,0.05);
      --border:rgba(255,255,255,0.09);
      --text:#f5f7f4;
      --muted:#b3bdb7;
      --accent-1:#b1cf62;
      --accent-2:#67af8a;
      --accent-3:#2f7087;
      --shadow:0 24px 80px rgba(0,0,0,0.35);
    }

    *{
      box-sizing:border-box;
    }

    html, body{
      margin:0;
      min-height:100%;
      font-family:"Inter", sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 20% 20%, rgba(177,207,98,0.12), transparent 28%),
        radial-gradient(circle at 80% 25%, rgba(47,112,135,0.18), transparent 32%),
        radial-gradient(circle at 50% 100%, rgba(103,175,138,0.10), transparent 28%),
        linear-gradient(135deg, var(--bg), var(--bg-2));
    }

    body{
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
      overflow:hidden;
    }

    .orb{
      position:fixed;
      border-radius:999px;
      filter:blur(80px);
      opacity:.35;
      z-index:0;
      pointer-events:none;
      animation:floatOrb 10s ease-in-out infinite;
    }

    .orb.one{
      width:220px;
      height:220px;
      background:rgba(177,207,98,0.35);
      top:8%;
      left:8%;
    }

    .orb.two{
      width:280px;
      height:280px;
      background:rgba(47,112,135,0.35);
      bottom:8%;
      right:10%;
      animation-delay:2s;
    }

    @keyframes floatOrb{
      0%,100%{transform:translateY(0) translateX(0)}
      50%{transform:translateY(-10px) translateX(8px)}
    }

    .card{
      position:relative;
      z-index:1;
      width:100%;
      max-width:880px;
      background:var(--card);
      border:1px solid var(--border);
      border-radius:30px;
      box-shadow:var(--shadow);
      backdrop-filter:blur(16px);
      -webkit-backdrop-filter:blur(16px);
      text-align:center;
      padding:64px 34px 48px;
      overflow:hidden;
    }

    .card::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 50% 15%, rgba(255,255,255,0.05), transparent 25%);
      pointer-events:none;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      gap:10px;
      padding:9px 16px;
      border-radius:999px;
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.08);
      color:var(--muted);
      font-size:12px;
      letter-spacing:0.12em;
      text-transform:uppercase;
      margin-bottom:26px;
    }

    .badge::before{
      content:"";
      width:8px;
      height:8px;
      border-radius:50%;
      background:linear-gradient(135deg,var(--accent-1),var(--accent-3));
      box-shadow:0 0 14px rgba(103,175,138,0.55);
    }

    .logo-wrap{
      position:relative;
      width:160px;
      height:160px;
      margin:0 auto 28px;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .logo-wrap::before{
      content:"";
      position:absolute;
      width:150px;
      height:150px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(103,175,138,0.20), rgba(47,112,135,0.08), transparent 70%);
      filter:blur(10px);
    }

    .logo{
      position:relative;
      z-index:1;
      width:118px;
      max-width:100%;
      filter:drop-shadow(0 12px 26px rgba(0,0,0,0.28));
      animation:floatLogo 6s ease-in-out infinite;
    }

    @keyframes floatLogo{
      0%,100%{
        transform:translateY(0);
      }
      50%{
        transform:translateY(-6px);
      }
    }

    h1{
      margin:0;
      font-size:clamp(38px, 7vw, 74px);
      line-height:1;
      letter-spacing:0.04em;
      font-weight:800;
    }

    .subtitle{
      max-width:680px;
      margin:20px auto 0;
      color:var(--muted);
      font-size:clamp(17px, 2.3vw, 22px);
      line-height:1.7;
    }

    .accent-line{
      width:90px;
      height:3px;
      border-radius:999px;
      margin:30px auto 26px;
      background:linear-gradient(90deg,var(--accent-1),var(--accent-2),var(--accent-3));
      box-shadow:0 0 20px rgba(103,175,138,0.25);
    }

    .mini-text{
      color:#93a19a;
      font-size:14px;
      line-height:1.8;
      max-width:620px;
      margin:0 auto;
    }

    .actions{
      display:flex;
      justify-content:center;
      flex-wrap:wrap;
      gap:14px;
      margin-top:34px;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:180px;
      padding:15px 24px;
      border-radius:16px;
      text-decoration:none;
      font-size:15px;
      font-weight:600;
      transition:all .25s ease;
    }

    .btn-primary{
      color:white;
      background:linear-gradient(135deg,var(--accent-1),var(--accent-2),var(--accent-3));
      box-shadow:0 14px 34px rgba(47,112,135,0.30);
    }

    .btn-primary:hover{
      transform:translateY(-2px);
      box-shadow:0 18px 40px rgba(47,112,135,0.38);
    }

    .btn-secondary{
      color:var(--text);
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.08);
    }

    .btn-secondary:hover{
      transform:translateY(-2px);
      background:rgba(255,255,255,0.06);
    }

    .footer{
      margin-top:36px;
      color:#8b9690;
      font-size:13px;
      line-height:1.8;
    }

    @media (max-width:640px){
      body{
        padding:16px;
      }

      .card{
        padding:44px 20px 34px;
        border-radius:24px;
      }

      .logo-wrap{
        width:130px;
        height:130px;
      }

      .logo{
        width:95px;
      }

      .actions{
        flex-direction:column;
      }

      .btn{
        width:100%;
      }
    }
  </style>
</head>
<body>
  <div class="orb one"></div>
  <div class="orb two"></div>

  <main class="card">
    <div class="badge">Studio créatif digital</div>

    <div class="logo-wrap">
      <img src="logo-la.png" alt="Logo LabsAStudio" class="logo">
    </div>

    <h1>LabsAStudio</h1>

    <p class="subtitle">
      Créations digitales, design et ressources créatives
      en préparation.
    </p>

    <div class="accent-line"></div>

    <p class="mini-text">
      Un univers plus moderne, plus propre et plus visuel arrive bientôt.
    </p>

    <div class="actions">
      <a href="mailto:contact@labsastudio.fr" class="btn btn-primary">Me contacter</a>
      <a href="https://labsastudio.github.io/LabsAStudio/" class="btn btn-secondary">Voir l’aperçu</a>
    </div>

    <div class="footer">
      Lancement prochainement<br>
      © LabsAStudio
    </div>
  </main>
</body>
</html>
