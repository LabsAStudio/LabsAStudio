<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LabsAStudio</title>
  <meta name="description" content="LabsAStudio — Créations digitales et outils modernes en préparation." />

  <style>
    :root{
      --bg-1:#0b1020;
      --bg-2:#111827;
      --card:rgba(255,255,255,0.08);
      --border:rgba(255,255,255,0.14);
      --text:#f9fafb;
      --muted:rgba(255,255,255,0.72);
      --accent-1:#60a5fa;
      --accent-2:#8b5cf6;
      --accent-3:#22d3ee;
      --shadow:0 20px 60px rgba(0,0,0,0.35);
    }

    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      min-height:100vh;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 15% 20%, rgba(96,165,250,0.25), transparent 28%),
        radial-gradient(circle at 85% 25%, rgba(139,92,246,0.22), transparent 30%),
        radial-gradient(circle at 50% 85%, rgba(34,211,238,0.14), transparent 30%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2));
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
      overflow:hidden;
    }

    .orb{
      position:fixed;
      border-radius:999px;
      filter:blur(70px);
      opacity:.45;
      z-index:0;
      animation:float 10s ease-in-out infinite;
    }

    .orb.one{
      width:220px;
      height:220px;
      background:var(--accent-1);
      top:8%;
      left:6%;
    }

    .orb.two{
      width:260px;
      height:260px;
      background:var(--accent-2);
      right:8%;
      top:18%;
      animation-delay:1.5s;
    }

    .orb.three{
      width:220px;
      height:220px;
      background:var(--accent-3);
      bottom:8%;
      left:38%;
      animation-delay:3s;
    }

    @keyframes float{
      0%,100%{transform:translateY(0) translateX(0)}
      50%{transform:translateY(-12px) translateX(8px)}
    }

    .card{
      position:relative;
      z-index:1;
      width:100%;
      max-width:760px;
      background:var(--card);
      border:1px solid var(--border);
      backdrop-filter:blur(16px);
      -webkit-backdrop-filter:blur(16px);
      border-radius:28px;
      padding:42px 28px;
      text-align:center;
      box-shadow:var(--shadow);
      animation:fadeUp .8s ease;
    }

    @keyframes fadeUp{
      from{
        opacity:0;
        transform:translateY(16px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    .badge{
      display:inline-block;
      padding:8px 14px;
      border:1px solid rgba(255,255,255,0.16);
      background:rgba(255,255,255,0.06);
      border-radius:999px;
      font-size:13px;
      letter-spacing:.06em;
      text-transform:uppercase;
      color:var(--muted);
      margin-bottom:18px;
    }

    .logo{
      font-size:clamp(38px, 8vw, 72px);
      font-weight:800;
      letter-spacing:.05em;
      margin:0 0 12px;
      line-height:1;
    }

    .logo span{
      background:linear-gradient(90deg,var(--accent-1),var(--accent-2),var(--accent-3));
      background-size:200% auto;
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
      animation:shine 6s linear infinite;
    }

    @keyframes shine{
      0%{background-position:0% center}
      100%{background-position:200% center}
    }

    .subtitle{
      margin:0 auto 28px;
      max-width:600px;
      font-size:clamp(17px, 2.4vw, 21px);
      line-height:1.7;
      color:var(--muted);
    }

    .actions{
      display:flex;
      gap:14px;
      justify-content:center;
      flex-wrap:wrap;
      margin-bottom:22px;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:180px;
      padding:14px 22px;
      border-radius:14px;
      text-decoration:none;
      font-weight:700;
      transition:.25s ease;
    }

    .btn-primary{
      color:white;
      background:linear-gradient(90deg,var(--accent-1),var(--accent-2));
      box-shadow:0 10px 30px rgba(99,102,241,0.35);
    }

    .btn-primary:hover{
      transform:translateY(-2px);
      box-shadow:0 16px 34px rgba(99,102,241,0.42);
    }

    .contact-note{
      font-size:15px;
      color:rgba(255,255,255,0.62);
      margin-bottom:14px;
    }

    .footer{
      font-size:14px;
      color:rgba(255,255,255,0.52);
    }

    @media (max-width:640px){
      .card{
        padding:34px 20px;
        border-radius:22px;
      }

      .actions{
        flex-direction:column;
      }

      .btn{
        width:100%;
      }
    }
  </style>
</head>
<body>

  <div class="orb one"></div>
  <div class="orb two"></div>
  <div class="orb three"></div>

  <main class="card">
    <div class="badge">Bientôt en ligne</div>

    <h1 class="logo">
      <span>LabsAStudio</span>
    </h1>

    <p class="subtitle">
      Créations digitales, outils et produits modernes en préparation.
      Le studio arrive bientôt avec un univers propre, créatif et pensé pour durer.
    </p>

    <div class="actions">
      <a class="btn btn-primary" href="mailto:contact@labsastudio.fr">Me contacter</a>
    </div>

    <div class="contact-note">
      Une question ou une demande ? Écris-moi à <strong>contact@labsastudio.fr</strong>
    </div>

    <div class="footer">
      © LabsAStudio
    </div>
  </main>

</body>
</html>
